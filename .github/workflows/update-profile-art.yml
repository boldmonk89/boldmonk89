name: Update profile art

# Re-scrapes the contribution calendar and re-renders the heatmap every day.
# No tokens, no external services — just requests + BeautifulSoup.

on:
  schedule:
    - cron: "17 4 * * *"      # daily at 04:17 UTC
  workflow_dispatch:            # let you run it by hand from the Actions tab

permissions:
  contents: write               # allow the job to commit the refreshed SVG

concurrency:
  group: profile-art
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r scripts/requirements.txt

      - name: Scrape contributions
        env:
          GH_PROFILE_USER: ${{ github.repository_owner }}
        run: python scripts/fetch_contributions.py

      - name: Render heatmap
        run: python scripts/render_heatmap_svg.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add contrib-heatmap.svg data/contributions.json
          if git diff --staged --quiet; then
            echo "No change in contributions today."
          else
            git commit -m "chore: daily profile art refresh"
            git push
          fi
